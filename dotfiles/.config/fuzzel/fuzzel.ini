[main]
# ── 字体（西文 JetBrainsMono，中文 LXGW WenKai）────────
font = JetBrainsMono Nerd Font:size=13, LXGW WenKai:size=13
icon-theme = Papirus-Dark
icons-enabled = yes

prompt = "   "
placeholder = "输入应用名称..."
hide-before-typing = no
anchor = center
width = 38
lines = 14
horizontal-pad = 36
vertical-pad = 22
inner-pad = 8
match-mode = fzf
sort-result = yes
terminal = kitty
delayed-filter-ms = 100

[colors]
# ════════════════════════════════════════════════════════
# 来源：你的 kitty 配色
#   bg  = #101317    深灰黑
#   fg  = #efdac1    暖米白
#   red = #AC8578    红褐（color1）
#   orange=#EFAC7C  橙黄（color2）
#   gray = #a79887  灰褐（color8）
#   surface= #101317（同 bg，但加透明度用作选中底色）
# ════════════════════════════════════════════════════════

background       = 10131799    
text             = efdac1ff    
input            = efdac1ff    
prompt           = EFAC7Cff    
placeholder      = a79887ff    
match            = AC8578ff    
selection        = 101317cc    
selection-text   = efdac1ff    
selection-match  = AC8578ff    
border           = a79887aa    
counter          = a79887ff    

[border]
width  = 1
radius = 14

[key-bindings]
# 保持默认，无需改动
