# include pywal colors
include ~/.config/kitty/colors-kitty.conf

# ── 主字体：Caskaydia Cove Nerd Font（ASCII / 拉丁 / 图标 / 符号全走它）──
# 如果你的 family 名不是这个 exact string，改成 fc-list 里逗号前那段原样
font_family      Caskaydia Cove NF
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# ── CJK（中文/日文/韩文表意文字 + 中文标点）→ 中文字体 ──────────────
# 这里用 LXGW WenKai Screen（你系统里已经有），
# 换成 Noto Sans CJK SC 也行，看你喜欢哪种中文衬线感
symbol_map  U+2E80-U+9FFF,U+F900-U+FAFF,U+3000-U+303F,U+FF00-U+FFEF  LXGW WenKai Screen

# ── emoji 单独兜底（可选但推荐）────────────────────────────────────────
symbol_map  U+1F000-U+1FFFF  Noto Color Emoji
cursor_trail 1
# 半透明背景（< 1.0 才会触发）
background_opacity 0.68

# 开模糊（1 = 开，这是 ext-background-effect 路径，不是旧 macOS/KDE 专属了）
# background_blur 1

# 可选：给透明区一个底色（建议匹配你壁纸暗色调）
background #14161c

font_size 14.0

initial_window_width 95c
initial_window_height 35c

enable_image_protocol yes
enable_audio_bell no

# window
window_padding_width 5
window_margin_width 5
window_border_width 2px
active_border_color #dbe3c8
inactive_border_color #D2CE4B
enabled_layouts Tall, *

map kitty_mod+j third_window
map kitty_mod+l second_window
map kitty_mod+h first_window
map ctrl+shift+[ next_window
